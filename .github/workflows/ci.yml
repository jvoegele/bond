name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Elixir ${{ matrix.elixir }} / OTP ${{ matrix.otp }})
    # Pinned to 22.04: erlef/setup-beam has no prebuilt OTP < 26 for ubuntu-24.04.
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      # Spans the declared floor (1.16) through the current latest stable (1.20).
      # The Elixir axis is what drives the built-in type checker, so every supported
      # minor runs `mix test` (and thus the type-checker regression guard in
      # test/bond/type_checker_regression_test.exs, which is active from 1.18+).
      # OTP is pinned to 27.2 across the newer legs for a stable, cached dimension —
      # each pairing is within the minor's supported OTP range (1.18: 25–27, 1.19:
      # 26–28, 1.20: 27–29). 1.20 was also verified locally on OTP 29. Bumping the
      # newer legs to OTP 28/29 is a worthwhile follow-up (no OTP-28/29 leg yet).
      matrix:
        include:
          - elixir: "1.16.3"
            otp: "26.2"
          - elixir: "1.17.3"
            otp: "27.2"
          - elixir: "1.18.3"
            otp: "27.2"
          - elixir: "1.19.5"
            otp: "27.2"
          - elixir: "1.20.0"
            otp: "27.2"
    env:
      MIX_ENV: test
    steps:
      - uses: actions/checkout@v6
      - uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ matrix.otp }}
          elixir-version: ${{ matrix.elixir }}
      - name: Cache deps and build
        uses: actions/cache@v5
        with:
          path: |
            deps
            _build
          # Key includes lib/ source hash so changes to compiler internals
          # invalidate the cache. Without this, a stale _build snapshot can
          # trigger a partial recompile that races: e.g. a doc-chunk-only
          # change to lib/bond/compiler/compile_state_fsm/server.ex forces
          # Server.beam to be rewritten in parallel with the test/support
          # compile, and the user-fixture `use Bond` macro starts the FSM
          # gen_statem while Server is mid-write, producing
          # `module Bond.Compiler.CompileStateFSM.Server is not available`.
          # Cache-busting on lib source avoids that class of failure entirely.
          # The `-v2-` suffix is a one-time invalidation marker; bump on each
          # cache-shape change so old prefix-matching cached `_build`
          # snapshots don't restore-key-fallback into a new build that
          # expects different invariants.
          key: ${{ runner.os }}-mix-v2-${{ matrix.otp }}-${{ matrix.elixir }}-${{ hashFiles('lib/**/*.ex', '**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-v2-${{ matrix.otp }}-${{ matrix.elixir }}-
      - run: mix deps.get
      - run: mix test

  lint:
    name: Format and library warnings
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "27.2"
          elixir-version: "1.19.5"
      - uses: actions/cache@v5
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-lint-${{ hashFiles('**/mix.lock') }}
      - run: mix deps.get
      - run: mix format --check-formatted
      # Compiles the library (dev env, so the deliberately-illustrative
      # test/support fixtures are not in scope) with warnings as errors.
      - run: mix compile --warnings-as-errors

  dialyzer:
    name: Dialyzer (Bond library)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "27.2"
          elixir-version: "1.19.5"
      - name: Cache deps and build
        uses: actions/cache@v5
        with:
          path: |
            deps
            _build
          # Source-hash inclusion matches the test job's cache key — see
          # the rationale comment there.
          key: ${{ runner.os }}-dialyzer-build-v2-${{ hashFiles('lib/**/*.ex', '**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-dialyzer-build-v2-
      - name: Cache PLT
        uses: actions/cache@v5
        with:
          path: priv/plts
          key: ${{ runner.os }}-dialyzer-plt-${{ hashFiles('lib/**/*.ex', '**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-dialyzer-plt-
      - run: mix deps.get
      - run: mix dialyzer --format github

  downstream:
    name: Downstream consumer (warnings-as-errors + Dialyzer)
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: integration/consumer
    steps:
      - uses: actions/checkout@v6
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "27.2"
          elixir-version: "1.18.3"
      - name: Cache consumer deps and build
        uses: actions/cache@v5
        with:
          path: |
            integration/consumer/deps
            integration/consumer/_build
          key: ${{ runner.os }}-downstream-build-${{ hashFiles('integration/consumer/mix.lock', 'mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-downstream-build-
      # PLT cache is keyed on Bond source so it rebuilds when the library API changes,
      # not just when mix.lock changes.
      - name: Cache consumer PLT
        uses: actions/cache@v5
        with:
          path: integration/consumer/priv/plts
          key: ${{ runner.os }}-downstream-plt-${{ hashFiles('lib/**/*.ex', 'integration/consumer/mix.lock', 'mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-downstream-plt-
      - run: mix deps.get
      # The core of issue #2: prove the code Bond generates into a using module
      # is warning-free and Dialyzer-clean in a real consumer.
      - run: mix compile --warnings-as-errors
      - run: mix test
      - run: mix dialyzer --format github
